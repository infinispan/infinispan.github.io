<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="0" y="0" width="200" height="200" fill="white" rx="5"/>
  <g fill="none" stroke="#FF6600" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cloud shape -->
    <path d="M55 130 C20 130 15 100 35 90 C30 65 55 45 80 50 C90 30 120 25 140 40 C165 30 190 50 180 75 C195 80 195 110 175 115 C180 135 160 140 145 130 Z"/>
