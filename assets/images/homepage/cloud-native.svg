    <line x1="105" y1="105" x2="105" y2="115"/>
    <line x1="92" y1="82" x2="84" y2="75"/>
    <line x1="118" y1="82" x2="126" y2="75"/>
    <line x1="92" y1="98" x2="84" y2="105"/>
    <line x1="118" y1="98" x2="126" y2="105"/>
    <!-- Container boxes below cloud -->
    <rect x="50" y="150" width="30" height="22" rx="3"/>
    <rect x="85" y="150" width="30" height="22" rx="3"/>
    <rect x="120" y="150" width="30" height="22" rx="3"/>
    <!-- Connection lines from cloud to containers -->
    <line x1="65" y1="135" x2="65" y2="150"/>
    <line x1="100" y1="130" x2="100" y2="150"/>
    <line x1="135" y1="135" x2="135" y2="150"/>
