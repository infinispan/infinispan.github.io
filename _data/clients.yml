features:
  - key: authentication
    label: Authentication
  - key: encryption
    label: Encryption
  - key: protocol_version
    label: Protocol Version
  - key: client_intelligence
    label: Client Intelligence
  - key: cache
    label: Cache
  - key: multimap
    label: Multimap
  - key: counters
    label: Counters
  - key: locks
    label: Locks
  - key: streaming
    label: Streaming
  - key: iteration
    label: Iteration
  - key: listeners
    label: Listeners
  - key: continuous_queries
    label: Continuous Queries
  - key: near_caching
    label: Near Caching
  - key: cross_site
    label: Cross-site

clients:
  - name: Java
    protocol_version: "4.1"
    docs: /docs/stable/titles/hotrod_java/hotrod_java.html
    github: https://github.com/infinispan/infinispan
    description: The reference Hot Rod client, fully featured and production-ready.
    features:
      authentication: true
      encryption: true
      client_intelligence: true
      cache: true
      multimap: true
      counters: true
      locks: true
      streaming: true
      iteration: true
      listeners: true
      continuous_queries: true
      near_caching: true
      cross_site: true

  - name: Go
    protocol_version: "4.1"
    docs: https://github.com/infinispan/infinispan-go-client
    github: https://github.com/infinispan/infinispan-go-client
    description: Go client for Infinispan with Hot Rod protocol support.
    features:
      authentication: true
      encryption: true
      client_intelligence: true
      cache: true
      multimap: true
      counters: false
      locks: false
      streaming: false
      iteration: true
      listeners: true
      continuous_queries: false
      near_caching: true
      cross_site: false

  - name: JavaScript
    protocol_version: "4.1"
    docs: /docs/hotrod-clients/js/latest/js_client.html
    github: https://github.com/infinispan/js-client
