    description: Node.js client for server-side JavaScript applications.
    features:
      authentication: true
      encryption: true
      client_intelligence: true
      cache: true
      multimap: false
      counters: true
      locks: false
      streaming: false
      iteration: true
      listeners: true
      continuous_queries: false
      near_caching: true
      cross_site: true

  - name: C++
    protocol_version: "2.8"
    docs: /docs/hotrod-clients/cpp/latest/cpp_client.html
    github: https://github.com/infinispan/cpp-client
    description: Native C++ client for high-performance applications.
    features:
      authentication: true
      encryption: true
      client_intelligence: true
      cache: true
      multimap: false
      counters: false
      locks: false
      streaming: false
      iteration: true
      listeners: true
      continuous_queries: false
      near_caching: false
      cross_site: false

  - name: .NET
    protocol_version: "3.0"
    docs: /docs/hotrod-clients/dotnet/latest/dotnet_client.html
    github: https://github.com/infinispan/dotnet-client
    description: Client for .NET and C# applications.
    features:
      authentication: true
      encryption: true
      client_intelligence: true
      cache: true
      multimap: false
      counters: false
      locks: false
      streaming: false
      iteration: true
      listeners: true
      continuous_queries: false
      near_caching: false
      cross_site: false

  - name: Python
    protocol_version: "2.4"
