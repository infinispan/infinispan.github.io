name: Publish

on:
  repository_dispatch:
    types: [release_updated, guides_updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.API_TOKEN_GITHUB }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1
        with:
          ruby-version: '3.3'

      - name: Update release data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby _bin/update_releases.rb

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet _data/projects.yml && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit release data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Infinispan"
          git config user.email "infinispan@infinispan.org"
          git add _data/projects.yml
          git commit -m "Update release data from ${{ github.event.client_payload.project || 'manual trigger' }}"
          git push origin develop

      - name: Publish
        run: |
          git config user.name "Infinispan"
          git config user.email "infinispan@infinispan.org"
          _bin/publish.sh
