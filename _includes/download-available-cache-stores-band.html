<div class="grid-wrapper">
  <div class="width-12-12">
    <h4>Available Cache Stores</h4>
  </div>
  {% for entry in site.data.cachestores %}
    <div class="item-wrapper">
      <div class="item">
        <i class="fas fa-server text-orange"></i>
        <h6 class="margin-tb-0">{{ entry[1].title }}</h6>
        {% assign text = entry[1].text %}
        <p class="margin-tb-sm">{% include {{ text }} %}</p>
        <i class="fas fa-book text-orange"></i> <a href="{{ entry[1].docs }}"> Documentation</a>
      </div>
    </div>
  {% endfor %}
</div>
